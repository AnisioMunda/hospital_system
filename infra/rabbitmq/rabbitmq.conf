## ============================================================
## HospitalAO — RabbitMQ Configuration
## ============================================================
## Documentação: https://www.rabbitmq.com/configure.html
##
## NOTA: As credenciais (user/password/vhost) são definidas
## no docker-compose.yml via variáveis de ambiente.
## Este ficheiro trata apenas do comportamento do servidor.
## ============================================================


## ------------------------------------------------------------
## Logging
## ------------------------------------------------------------
## Nível de detalhe dos logs.
## Em dev usamos "info" para ver o que acontece.
## Em produção usar "warning" para reduzir volume de logs.
log.console = true
log.console.level = info


## ------------------------------------------------------------
## Heartbeat
## ------------------------------------------------------------
## O RabbitMQ verifica se os clientes ainda estão vivos
## enviando um "heartbeat" a cada N segundos.
## Se o cliente não responder, a ligação é fechada.
## 60 segundos é um bom valor para aplicações hospitalares
## que podem ter operações longas (gerar PDF, enviar para AGT).
heartbeat = 60


## ------------------------------------------------------------
## Tamanho máximo de mensagem
## ------------------------------------------------------------
## 10MB é suficiente para o nosso caso:
## - Mensagens normais: alguns KB (JSON com dados)
## - Maior mensagem possível: PDF de fatura (~2MB)
## Valor em bytes: 10 * 1024 * 1024 = 10485760
max_message_size = 10485760


## ------------------------------------------------------------
## Filas duráveis por defeito
## ------------------------------------------------------------
## "durable" significa que as filas sobrevivem a um restart
## do RabbitMQ. Sem isto, ao reiniciar o container,
## todas as mensagens não processadas perdem-se.
## Crítico num sistema hospitalar.
queue_master_locator = min-masters


## ------------------------------------------------------------
## Carregar definições iniciais
## ------------------------------------------------------------
## Este ficheiro JSON contém as filas, exchanges e bindings
## que queremos criar automaticamente ao arrancar.
## Poupa configuração manual pelo painel web.
management.load_definitions = /etc/rabbitmq/definitions.json


## ------------------------------------------------------------
## Management Plugin (painel web)
## ------------------------------------------------------------
## Porta do painel web de gestão (acessível em dev).
## Em produção este painel não deve estar exposto.
management.tcp.port = 15672