# ============================================================
# HospitalAO — Nginx Dev Config
# ============================================================
# Ficheiro usado pelo container "nginx" no docker-compose.yml.
#
# Função: receber todos os pedidos na porta 80 e encaminhar
# para o container correcto dentro da rede Docker.
#
# Regras de encaminhamento:
#   /api/*  → backend:8080  (API Spring Boot)
#   /ws/*   → backend:8080  (WebSocket)
#   /*      → frontend:4200 (Angular dev server)
# ============================================================

# Bloco "events": obrigatório no nginx.conf principal.
# Define como o Nginx gere as ligações.
events {
    # Número máximo de ligações simultâneas por worker.
    # 1024 é mais do suficiente para desenvolvimento.
    worker_connections 1024;
}

http {

    # ------------------------------------------------------------
    # Tipos MIME
    # ------------------------------------------------------------
    # Diz ao browser como interpretar cada tipo de ficheiro.
    # Sem isto, o browser podia tratar um ficheiro .js como texto.
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ------------------------------------------------------------
    # Logs de acesso e erros
    # ------------------------------------------------------------
    # Em dev, ver todos os pedidos que passam pelo Nginx
    # é útil para debugging.
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # ------------------------------------------------------------
    # Upstreams — os servidores destino
    # ------------------------------------------------------------
    # "upstream" define um grupo de servidores para onde
    # o Nginx pode encaminhar pedidos.
    # Usamos os nomes dos serviços Docker — dentro da rede
    # Docker, "backend" resolve para o IP do container backend,
    # e "frontend" resolve para o IP do container frontend.

    upstream backend_server {
        server backend:8080;
        # Em produção podíamos ter vários servidores aqui
        # para load balancing, mas em dev apenas um.
    }

    upstream frontend_server {
        server frontend:4200;
    }

    # ------------------------------------------------------------
    # Servidor principal — porta 80
    # ------------------------------------------------------------
    server {
        listen 80;
        server_name localhost;

        # Tamanho máximo de upload (para envio de ficheiros,
        # fotos de pacientes, PDFs de exames, etc.)
        client_max_body_size 25M;

        # ----------------------------------------------------------
        # Rota: /api/ → Backend Spring Boot
        # ----------------------------------------------------------
        # Todos os pedidos que começam com /api/ vão para o backend.
        # Exemplos:
        #   GET  /api/pacientes       → lista pacientes
        #   POST /api/auth/login      → fazer login
        #   GET  /api/consultas/123   → ver consulta
        location /api/ {
            proxy_pass http://backend_server;

            # Cabeçalhos importantes para o Spring Boot saber
            # quem fez o pedido originalmente
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts mais longos para operações demoradas
            # como gerar PDFs de faturas ou enviar para a AGT
            proxy_connect_timeout 30s;
            proxy_send_timeout    120s;
            proxy_read_timeout    120s;
        }

        # ----------------------------------------------------------
        # Rota: /actuator/ → Backend (health checks)
        # ----------------------------------------------------------
        # Endpoint de monitorização do Spring Boot.
        # Só exposto em dev — em produção deve ser protegido.
        location /actuator/ {
            proxy_pass http://backend_server;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ----------------------------------------------------------
        # Rota: /ws/ → Backend WebSocket
        # ----------------------------------------------------------
        # WebSocket é diferente do HTTP normal — é uma ligação
        # persistente que fica aberta. Requer cabeçalhos especiais
        # para o "upgrade" do protocolo HTTP → WebSocket.
        #
        # Usado para:
        #   - Fila de espera em tempo real (triagem)
        #   - Notificações ao médico (novo resultado de exame)
        location /ws/ {
            proxy_pass http://backend_server;

            # Cabeçalhos obrigatórios para WebSocket
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;

            # Manter a ligação WebSocket aberta por 1 hora
            # (uma consulta pode demorar esse tempo)
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ----------------------------------------------------------
        # Rota: / → Frontend Angular
        # ----------------------------------------------------------
        # Tudo o que não seja /api/ ou /ws/ vai para o Angular.
        # O Angular dev server tem hot-reload incluído —
        # quando alteras código, o browser actualiza automaticamente.
        location / {
            proxy_pass http://frontend_server;

            # Cabeçalhos normais de proxy
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Hot-reload do Angular usa WebSocket internamente.
            # Estes cabeçalhos garantem que o hot-reload funciona
            # mesmo passando pelo Nginx.
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Timeout longo para o Angular dev server
            # (na primeira compilação pode demorar 30+ segundos)
            proxy_read_timeout 300s;
        }
    }
}