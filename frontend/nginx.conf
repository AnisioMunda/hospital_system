# ============================================================
# HospitalAO Frontend — nginx.conf
# ============================================================
# Este ficheiro configura o Nginx para servir correctamente
# uma Angular SPA (Single Page Application).
#
# Problema que resolve:
#   O Angular tem só 1 ficheiro HTML (index.html).
#   Quando o utilizador acede a /pacientes/123, o Nginx
#   por defeito tentaria encontrar o ficheiro pacientes/123.html
#   que não existe → erro 404.
#   A solução é o "try_files" que redireciona tudo para o
#   index.html, e o Angular trata do roteamento internamente.
# ============================================================

server {
    listen 80;
    server_name _;
    # "_" = aceitar qualquer hostname (localhost, IP, domínio)

    # Pasta onde estão os ficheiros compilados do Angular
    root /usr/share/nginx/html;
    index index.html;

    # ----------------------------------------------------------
    # Compressão gzip
    # ----------------------------------------------------------
    # Comprime os ficheiros antes de os enviar ao browser.
    # Um ficheiro JS de 500KB pode ficar em 100KB após compressão.
    # Melhora muito a velocidade de carregamento, especialmente
    # em ligações lentas como as que existem em Angola.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ----------------------------------------------------------
    # Cache para assets estáticos (JS, CSS, imagens)
    # ----------------------------------------------------------
    # O Angular adiciona um hash ao nome dos ficheiros compilados:
    # Ex: main.a3f2c1d8.js
    # Quando o código muda, o hash muda, o browser descarrega o novo.
    # Quando não muda, o browser usa a versão em cache (sem pedido ao servidor).
    # "immutable" diz ao browser: este ficheiro nunca vai mudar,
    # podes guardar para sempre.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ----------------------------------------------------------
    # Sem cache para o index.html
    # ----------------------------------------------------------
    # O index.html é o único ficheiro que pode mudar entre deploys.
    # Forçar o browser a verificar sempre se há uma versão mais nova.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # ----------------------------------------------------------
    # Proxy para a API do backend
    # ----------------------------------------------------------
    # Todas as chamadas que começam com /api são encaminhadas
    # para o container do backend (Spring Boot na porta 8080).
    # O utilizador vê "hospital.ao/api/pacientes" mas na realidade
    # a chamada vai para "backend:8080/api/pacientes" internamente.
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts mais longos para operações hospitalares
        # (gerar PDF de fatura pode demorar alguns segundos)
        proxy_connect_timeout 30s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }

    # ----------------------------------------------------------
    # WebSocket para actualizações em tempo real
    # ----------------------------------------------------------
    # Usado para: fila de espera em tempo real, notificações, etc.
    # WebSocket é uma ligação persistente (não fecha após a resposta).
    location /ws/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        # Estes dois headers são obrigatórios para WebSocket funcionar
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        # Manter a ligação aberta por até 1 hora
        proxy_read_timeout 3600s;
    }

    # ----------------------------------------------------------
    # SOLUÇÃO SPA — Redirecionar tudo para index.html
    # ----------------------------------------------------------
    # 1. Tentar servir o ficheiro exacto ($uri)
    # 2. Tentar servir como pasta ($uri/)
    # 3. Se nada existe → servir o index.html
    #    (o Angular trata do roteamento a partir daí)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ----------------------------------------------------------
    # Segurança — bloquear ficheiros ocultos
    # ----------------------------------------------------------
    # Impede acesso a ficheiros como .env, .git, .htaccess, etc.
    location ~ /\. {
        deny all;
        return 404;
    }
}