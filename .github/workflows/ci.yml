# ============================================================
# HospitalAO — GitHub Actions CI Pipeline
# ============================================================

name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '22'

jobs:

  # ----------------------------------------------------------
  # Job 1: Backend Spring Boot
  # ----------------------------------------------------------
  backend-ci:
    name: Backend (Spring Boot)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hospitalao_test
          POSTGRES_USER: hospitalao
          POSTGRES_PASSWORD: test_password_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Compilar backend
        working-directory: ./backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: hospitalao_test
          DB_USER: hospitalao
          DB_PASSWORD: test_password_ci
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: ''
          RABBITMQ_HOST: localhost
          RABBITMQ_PORT: 5672
          RABBITMQ_USER: guest
          RABBITMQ_PASSWORD: guest
          RABBITMQ_VHOST: /
          JWT_SECRET: ci_test_secret_key_must_be_at_least_64_bytes_long_aaaaaaaaaaaaaaa
          JWT_EXPIRATION_MS: 900000
          JWT_REFRESH_EXPIRATION_MS: 604800000
          HOSPITAL_NOME: Hospital Teste CI
          HOSPITAL_NIF: 5000000001HA044
          MINIO_ENDPOINT: http://localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          SPRING_PROFILES_ACTIVE: test
        run: mvn package -DskipTests -B --no-transfer-progress


  # ----------------------------------------------------------
  # Job 2: Frontend Angular
  # ----------------------------------------------------------
  frontend-ci:
    name: Frontend (Angular)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Instalar dependências
        working-directory: ./frontend
        run: npm install

      - name: Compilar Angular
        working-directory: ./frontend
        run: ./node_modules/.bin/ng build --configuration production


  # ----------------------------------------------------------
  # Job 3: Validar builds Docker
  # ----------------------------------------------------------
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [ backend-ci, frontend-ci ]

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validar build do Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          target: development
          push: false
          tags: hospitalao-backend:ci

      - name: Validar build do Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          target: development
          push: false
          tags: hospitalao-frontend:ci