<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>Document</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans, sans-serif);
    }

    .board {
      padding: 1rem 0;
    }

    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
      align-items: center;
    }

    .filter-btn {
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 20px;
      border: 0.5px solid var(--color-border-secondary);
      background: transparent;
      cursor: pointer;
      color: var(--color-text-secondary);
      transition: all .15s;
    }

    .filter-btn.active {
      background: var(--color-background-info);
      color: var(--color-text-info);
      border-color: var(--color-border-info);
    }

    .filter-btn:hover {
      background: var(--color-background-secondary);
    }

    .search {
      flex: 1;
      min-width: 160px;
      font-size: 13px;
      padding: 5px 10px;
      border-radius: 6px;
      border: 0.5px solid var(--color-border-secondary);
      background: transparent;
      color: var(--color-text-primary);
    }

    .sprint-block {
      margin-bottom: 1.5rem;
    }

    .sprint-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 8px;
      background: var(--color-background-secondary);
      border: 0.5px solid var(--color-border-tertiary);
      cursor: pointer;
      margin-bottom: 8px;
      user-select: none;
    }

    .sprint-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--color-text-primary);
    }

    .sprint-meta {
      font-size: 12px;
      color: var(--color-text-secondary);
      margin-left: auto;
    }

    .sprint-toggle {
      font-size: 11px;
      color: var(--color-text-tertiary);
    }

    .tasks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 8px;
    }

    .task {
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: 8px;
      padding: 10px 12px;
      background: var(--color-background-primary);
      transition: border-color .15s;
    }

    .task:hover {
      border-color: var(--color-border-secondary);
    }

    .task-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }

    .task-id {
      font-size: 11px;
      color: var(--color-text-tertiary);
      font-family: var(--font-mono, monospace);
      white-space: nowrap;
    }

    .task-badges {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .badge {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 20px;
      font-weight: 500;
      white-space: nowrap;
    }

    .badge-be {
      background: var(--color-background-info);
      color: var(--color-text-info);
    }

    .badge-fe {
      background: #EEEDFE;
      color: #3C3489;
    }

    .badge-infra {
      background: var(--color-background-warning);
      color: var(--color-text-warning);
    }

    .badge-agt {
      background: #FAECE7;
      color: #993C1D;
    }

    .badge-qa {
      background: var(--color-background-success);
      color: var(--color-text-success);
    }

    .task-title {
      font-size: 13px;
      color: var(--color-text-primary);
      line-height: 1.4;
      margin-bottom: 4px;
    }

    .task-desc {
      font-size: 11px;
      color: var(--color-text-secondary);
      line-height: 1.5;
    }

    .task-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
    }

    .points {
      font-size: 11px;
      color: var(--color-text-tertiary);
    }

    .epic-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }

    .hidden {
      display: none !important;
    }

    .empty {
      font-size: 13px;
      color: var(--color-text-tertiary);
      padding: 12px;
      text-align: center;
    }

    .stats {
      display: flex;
      gap: 12px;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .stat {
      background: var(--color-background-secondary);
      border-radius: 8px;
      padding: 8px 14px;
    }

    .stat-num {
      font-size: 20px;
      font-weight: 500;
      color: var(--color-text-primary);
    }

    .stat-lbl {
      font-size: 11px;
      color: var(--color-text-secondary);
    }
  </style>
</head>

<body>
  <div class="board">
    <div class="stats" id="stats"></div>
    <div class="controls">
      <input class="search" type="text" id="search" placeholder="Pesquisar tasks..." oninput="render()">

      <button class="filter-btn" onclick="setFilter('BE',this)">Backend</button>
      <button class="filter-btn" onclick="setFilter('FE',this)">Frontend</button>
      <button class="filter-btn" onclick="setFilter('INFRA',this)">Infra</button>
      <button class="filter-btn" onclick="setFilter('AGT',this)">AGT</button>
      <button class="filter-btn" onclick="setFilter('QA',this)">QA</button>
    </div>
    <div id="board-content"></div>
  </div>

          { id: 'T-076', title: 'API de pré-fatura (resumo de custos)', desc: 'GET /api/faturacao/episodio/{id}/resumo. Listar itens, aplicar desconto de seguradora, calcular co-pagamento', type: ['BE'], epic: 'fat', pts: 3 },
          { id: 'T-077', title: 'Configuração de tabela de preços (UI)', desc: 'CRUD de atos clínicos e preços. Importação de tabela SNS-AO via CSV', type: ['FE'], epic: 'fat', pts: 3 },
          { id: 'T-078', title: 'Configuração de acordos com seguradoras (UI)', desc: 'Gestão de coberturas por seguradora: percentagem, teto máximo, atos excluídos', type: ['FE'], epic: 'fat', pts: 3 },
          { id: 'T-079', title: 'Tela de pré-fatura (UI)', desc: 'Resumo detalhado de todos os itens consumidos no episódio. Aplicar seguradora, ver co-pagamento', type: ['FE'], epic: 'fat', pts: 4 },
          { id: 'T-080', title: 'Gestão de pagamentos parciais e adiantamentos', desc: 'API e UI para registar pagamentos antes da alta. Calcular saldo em aberto', type: ['BE'], epic: 'fat', pts: 3 },
        ]
      },
      {
        id: 'S8', title: 'Sprint 8 — Fatura Eletrónica AGT', weeks: 'Semanas 17–18',
        tasks: [
          { id: 'T-081', title: 'Estudar e documentar normas AGT para fatura eletrónica', desc: 'Formato XML AGT, campos obrigatórios, série de faturação, assinatura digital, QR Code. Guardar docs em /docs/agt', type: ['AGT'], epic: 'agt', pts: 3 },
          { id: 'T-082', title: 'Migration: tabela de séries e numeração de faturas', desc: 'Tabela: serie_fatura (prefixo, ano, contador, tipo). Garantir sequência sem gaps', type: ['BE', 'AGT'], epic: 'agt', pts: 2 },
          { id: 'T-083', title: 'Serviço de geração de XML para fatura AGT', desc: 'Mapear dados do episódio para formato XML AGT. Campos: NIF hospital, NIF cliente, linhas de detalhe, IVA, total', type: ['BE', 'AGT'], epic: 'agt', pts: 5 },
          { id: 'T-084', title: 'Geração de QR Code de validação AGT', desc: 'QR Code com hash da fatura conforme especificação AGT. Biblioteca ZXing', type: ['BE', 'AGT'], epic: 'agt', pts: 3 },
          { id: 'T-085', title: 'Geração de PDF da fatura eletrónica', desc: 'Modelo de fatura conforme layout AGT: cabeçalho, itens, totais, IVA, QR Code, rodapé legal. iText/JasperReports', type: ['BE', 'AGT'], epic: 'agt', pts: 5 },
          { id: 'T-086', title: 'API de emissão de fatura', desc: 'POST /api/faturas/emitir. Transação atómica: gerar XML + PDF + gravar BD + armazenar MinIO', type: ['BE', 'AGT'], epic: 'agt', pts: 3 },
          { id: 'T-087', title: 'Geração de SAFT-AO (ficheiro mensal)', desc: 'Exportar ficheiro SAF-T Angola com todas as faturas do período. GET /api/relatorios/saft?mes=&ano=', type: ['BE', 'AGT'], epic: 'agt', pts: 5 },
          { id: 'T-088', title: 'Integração com portal da AGT (submissão de faturas)', desc: 'Envio automático de faturas ao portal AGT via API (se disponível) ou geração de lote para upload manual', type: ['BE', 'AGT'], epic: 'agt', pts: 5 },
          { id: 'T-089', title: 'Anulação e nota de crédito', desc: 'POST /api/faturas/{id}/anular. Gerar nota de crédito referenciando fatura original. Regras AGT', type: ['BE', 'AGT'], epic: 'agt', pts: 3 },
          { id: 'T-090', title: 'Tela de faturação — emissão (UI)', desc: 'Ver resumo do episódio, confirmar dados do cliente/NIF, emitir fatura, download PDF, enviar por email', type: ['FE', 'AGT'], epic: 'agt', pts: 4 },
          { id: 'T-091', title: 'Registo de pagamento final e recibo (UI)', desc: 'Registar meio de pagamento (numerário, TPA, transferência), emitir recibo', type: ['FE'], epic: 'fat', pts: 3 },
          { id: 'T-092', title: 'Listagem e pesquisa de faturas emitidas (UI)', desc: 'Filtrar por data, estado, paciente, valor. Download PDF, ver XML, emitir nota de crédito', type: ['FE', 'AGT'], epic: 'agt', pts: 3 },
        ]
      },
      {
        id: 'S9', title: 'Sprint 9 — Dashboards, BI e Relatórios', weeks: 'Semanas 19–20',
        tasks: [
          { id: 'T-093', title: 'API de KPIs hospitalares', desc: 'Endpoints: ocupação de camas, pacientes/dia, tempo médio de espera, receita do período', type: ['BE'], epic: 'bi', pts: 3 },
          { id: 'T-094', title: 'Dashboard de gestão hospitalar (UI)', desc: 'Cards KPI + gráficos: atendimentos por dia, top diagnósticos, ocupação por enfermaria. Chart.js', type: ['FE'], epic: 'bi', pts: 5 },
          { id: 'T-095', title: 'Dashboard financeiro (UI)', desc: 'Receita por período, faturas pagas/pendentes, receita por seguradora, ticket médio', type: ['FE'], epic: 'bi', pts: 4 },
          { id: 'T-096', title: 'Relatório de produção médica', desc: 'Atendimentos por médico, por especialidade, por período. Exportar Excel/PDF', type: ['BE', 'FE'], epic: 'bi', pts: 3 },
          { id: 'T-097', title: 'Relatório de stock da farmácia', desc: 'Consumo por medicamento, alertas de rutura, lotes a vencer. Exportar Excel', type: ['BE', 'FE'], epic: 'bi', pts: 2 },
          { id: 'T-098', title: 'Relatório para SNS-AO', desc: 'Estatísticas de internamento, altas, diagnósticos mais frequentes conforme formato SNS-AO', type: ['BE'], epic: 'bi', pts: 3 },
        ]
      },
      {
        id: 'S10', title: 'Sprint 10 — QA, Segurança e Deploy', weeks: 'Semanas 21–22',
        tasks: [
          { id: 'T-099', title: 'Testes unitários Spring Boot (cobertura ≥ 80%)', desc: 'JUnit 5 + Mockito. Focar em: motor de faturação, serviço AGT, lógica de triagem', type: ['QA', 'BE'], epic: 'qa', pts: 5 },
          { id: 'T-100', title: 'Testes de integração Spring Boot', desc: 'TestContainers com Postgres real. Testar fluxo completo: admissão → fatura', type: ['QA', 'BE'], epic: 'qa', pts: 4 },
          { id: 'T-101', title: 'Testes E2E com Cypress', desc: 'Fluxo crítico: login → admissão paciente → triagem → consulta → alta → emitir fatura', type: ['QA', 'FE'], epic: 'qa', pts: 5 },
          { id: 'T-102', title: 'Auditoria de segurança da API', desc: 'OWASP Top 10. Rate limiting (Bucket4j), validação de inputs, headers de segurança HTTP', type: ['BE', 'QA'], epic: 'qa', pts: 4 },
          { id: 'T-103', title: 'Criptografia de dados sensíveis na BD', desc: 'Encriptar: NIF, BI, dados clínicos sensíveis. Jasypt para propriedades da aplicação', type: ['BE'], epic: 'qa', pts: 3 },
          { id: 'T-104', title: 'Configurar backup automático do PostgreSQL', desc: 'pg_dump diário via cron dentro do container. Guardar em MinIO. Retenção de 30 dias', type: ['INFRA'], epic: 'qa', pts: 2 },
          { id: 'T-105', title: 'Configurar monitorização com Prometheus + Grafana', desc: 'Métricas do Spring Actuator → Prometheus → dashboard Grafana: latência, erros, JVM', type: ['INFRA'], epic: 'qa', pts: 3 },
          { id: 'T-106', title: 'Logging centralizado com ELK Stack', desc: 'Logback → Logstash → Elasticsearch → Kibana. Logs estruturados em JSON', type: ['INFRA'], epic: 'qa', pts: 4 },
          { id: 'T-107', title: 'Preparar docker-compose de produção', desc: 'Versão prod sem volumes de dev, restart policies, limites de memória, secrets via env', type: ['INFRA'], epic: 'qa', pts: 2 },
          { id: 'T-108', title: 'Configurar SSL/TLS com certificado', desc: 'Certificado Let\'s Encrypt ou auto-assinado. Configurar Nginx com HTTPS obrigatório', type: ['INFRA'], epic: 'qa', pts: 2 },
          { id: 'T-109', title: 'Documentação da API com Swagger/OpenAPI', desc: 'Todos os endpoints documentados com exemplos. Swagger UI disponível em /api/docs', type: ['BE'], epic: 'qa', pts: 2 },
          { id: 'T-110', title: 'Manual do utilizador por perfil', desc: 'Documentação em PDF para: recepcionista, médico, enfermeiro, farmacêutico, financeiro, admin', type: ['QA'], epic: 'qa', pts: 4 },
        ]
      }
    ];

    let activeFilter = 'all';

    function setFilter(f, btn) {
      activeFilter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function render() {
      const q = document.getElementById('search').value.toLowerCase();
      const content = document.getElementById('board-content');
      let html = '';
      let total = 0, shown = 0;

      SPRINTS.forEach(sprint => {
        const tasks = sprint.tasks.filter(t => {
          const matchFilter = activeFilter === 'all' || t.type.includes(activeFilter);
          const matchSearch = !q || t.title.toLowerCase().includes(q) || t.id.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q);
          return matchFilter && matchSearch;
        });
        total += sprint.tasks.length;
        shown += tasks.length;
        if (tasks.length === 0) return;

        const totalPts = tasks.reduce((a, t) => a + t.pts, 0);
        const sprintId = sprint.id;

        html += `<div class="sprint-block">
      <div class="sprint-header" onclick="toggleSprint('${sprintId}')">
        <span class="sprint-title">${sprint.title}</span>
        <span class="sprint-meta">${sprint.weeks} · ${tasks.length} tasks · ${totalPts} pts</span>
        <span class="sprint-toggle" id="toggle-${sprintId}">▼</span>
      </div>
      <div id="tasks-${sprintId}" class="tasks-grid">`;

        tasks.forEach(t => {
          const badges = t.type.map(tp => {
            const cls = tp === 'BE' ? 'badge-be' : tp === 'FE' ? 'badge-fe' : tp === 'INFRA' ? 'badge-infra' : tp === 'AGT' ? 'badge-agt' : 'badge-qa';
            return `<span class="badge ${cls}">${tp}</span>`;
          }).join('');
          const epic = EPICS[t.epic];
          html += `<div class="task">
        <div class="task-top">
          <span class="task-id">${t.id}</span>
          <div class="task-badges">${badges}</div>
        </div>
        <div class="task-title">${t.title}</div>
        <div class="task-desc">${t.desc}</div>
        <div class="task-footer">
          <span style="display:flex;align-items:center;gap:4px;">
            <span class="epic-dot" style="background:${epic.color}"></span>
            <span style="font-size:11px;color:var(--color-text-tertiary)">${epic.label}</span>
          </span>
          <span class="points">${t.pts} pts</span>
        </div>
      </div>`;
        });

        html += `</div></div>`;
      });

      content.innerHTML = html;

      const allPts = SPRINTS.flatMap(s => s.tasks).reduce((a, t) => a + t.pts, 0);
      const shownPts = SPRINTS.flatMap(s => s.tasks).filter(t => {
        const matchFilter = activeFilter === 'all' || t.type.includes(activeFilter);
        const q2 = document.getElementById('search').value.toLowerCase();
        return matchFilter && (!q2 || t.title.toLowerCase().includes(q2) || t.id.toLowerCase().includes(q2));
      }).reduce((a, t) => a + t.pts, 0);

      document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-num">${SPRINTS.length}</div><div class="stat-lbl">Sprints</div></div>
    <div class="stat"><div class="stat-num">${shown}</div><div class="stat-lbl">Tasks visíveis</div></div>
    <div class="stat"><div class="stat-num">${total}</div><div class="stat-lbl">Total tasks</div></div>
    <div class="stat"><div class="stat-num">${shownPts}</div><div class="stat-lbl">Story points</div></div>
    <div class="stat"><div class="stat-num">22</div><div class="stat-lbl">Semanas estimadas</div></div>
  `;
    }

    function toggleSprint(id) {
      const el = document.getElementById('tasks-' + id);
      const tog = document.getElementById('toggle-' + id);
      if (el.style.display === 'none') {
        el.style.display = 'grid';
        tog.textContent = '▼';
      } else {
        el.style.display = 'none';
        tog.textContent = '▶';
      }
    }

    render();
  </script>
</body>
